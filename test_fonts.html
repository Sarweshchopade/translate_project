<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Font Test</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;500;600;700&family=Noto+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans', 'Noto Sans Devanagari', sans-serif;
            background: #0A0E27;
            color: white;
            padding: 20px;
        }
        .test-text {
            font-size: 24px;
            margin: 10px 0;
            padding: 10px;
            border: 1px solid #333;
            border-radius: 8px;
        }
        .devanagari {
            font-family: 'Noto Sans Devanagari', sans-serif;
        }
    </style>
</head>
<body>
    <h1>Font Rendering Test</h1>
    
    <div class="test-text">
        <strong>English:</strong> Hello, how are you?
    </div>
    
    <div class="test-text devanagari">
        <strong>Hindi:</strong> नमस्ते, आप कैसे हैं?
    </div>
    
    <div class="test-text devanagari">
        <strong>Nepali:</strong> नमस्कार, तपाईं कसरी हुनुहुन्छ?
    </div>
    
    <div class="test-text devanagari">
        <strong>Test Translation:</strong> मैं दौड़ रहा हूं (I am running)
    </div>
    
    <div class="test-text devanagari">
        <strong>More Test:</strong> जंप (jump) - लेखन (write)
    </div>
</body>
</html>
